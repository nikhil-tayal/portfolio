  <text x="50" y="644" font-size="12" fill="#6B8CC9">Ref: HT-10921 · DEL → SLV</text>
  <rect x="282" y="572" width="60" height="24" rx="12" fill="#DCFCE7"/>
  <text x="296" y="589" font-size="10" fill="#15803D" letter-spacing="1">VALID</text>

