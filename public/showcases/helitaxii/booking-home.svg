<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" font-family="ui-sans-serif, system-ui, sans-serif">
  <rect width="1600" height="1000" fill="#F5F5FA"/>

  <!-- top nav -->
  <rect x="0" y="0" width="1600" height="72" fill="#FFFFFF"/>
  <line x1="0" y1="72" x2="1600" y2="72" stroke="#12121E" stroke-opacity="0.08"/>
  <text x="80" y="44" font-size="20" font-weight="600" fill="#12121E">Helitaxii</text>
  <g fill="#44445A" font-size="13">
    <text x="780" y="44">Flights</text>
    <text x="880" y="44">Charter</text>
    <text x="980" y="44">Pilgrimage</text>
    <text x="1100" y="44">About</text>
    <text x="1180" y="44">Contact</text>
  </g>
  <rect x="1420" y="22" width="110" height="32" rx="16" fill="#12121E"/>
  <text x="1443" y="43" font-size="12" fill="#F5F5FA" letter-spacing="1">BOOK NOW</text>

  <!-- hero copy -->
  <text x="80" y="212" font-size="72" font-weight="300" fill="#12121E" letter-spacing="-1.5">Sky is the new</text>
  <text x="80" y="296" font-size="72" font-weight="300" fill="#12121E" letter-spacing="-1.5">shortcut.</text>
  <text x="80" y="356" font-size="18" fill="#44445A">Charter, scheduled and pilgrimage helicopter flights across India.</text>

  <!-- search card -->
  <rect x="80" y="420" width="1440" height="148" rx="18" fill="#FFFFFF" stroke="#12121E" stroke-opacity="0.08"/>

  <g fill="#8A8AA8" font-size="11" letter-spacing="1.5">
    <text x="116" y="460">FROM</text>
    <text x="480" y="460">TO</text>
    <text x="840" y="460">DATE</text>
    <text x="1140" y="460">PASSENGERS</text>
  </g>
  <g fill="#12121E" font-size="20" font-weight="500">
    <text x="116" y="500">Delhi · DEL</text>
    <text x="480" y="500">Shimla · SLV</text>
    <text x="840" y="500">Apr 22, 2026</text>
    <text x="1140" y="500">2 adults</text>
  </g>
  <line x1="440" y1="442" x2="440" y2="542" stroke="#12121E" stroke-opacity="0.08"/>
  <line x1="800" y1="442" x2="800" y2="542" stroke="#12121E" stroke-opacity="0.08"/>
  <line x1="1100" y1="442" x2="1100" y2="542" stroke="#12121E" stroke-opacity="0.08"/>
  <rect x="1360" y="464" width="140" height="56" rx="28" fill="#2563EB"/>
  <text x="1400" y="500" font-size="13" fill="#FFFFFF" letter-spacing="2">SEARCH</text>

  <!-- popular routes -->
  <text x="80" y="660" font-size="11" letter-spacing="2.5" fill="#8A8AA8">POPULAR ROUTES</text>

  <g>
    <rect x="80" y="684" width="340" height="220" rx="16" fill="#FFFFFF" stroke="#12121E" stroke-opacity="0.08"/>
    <rect x="80" y="684" width="340" height="120" rx="16" fill="#EBEBF2"/>
    <text x="112" y="838" font-size="18" fill="#12121E" font-weight="500">Delhi → Shimla</text>
    <text x="112" y="864" font-size="13" fill="#44445A">55 min · from ₹32,500</text>
  </g>
  <g>
    <rect x="444" y="684" width="340" height="220" rx="16" fill="#FFFFFF" stroke="#12121E" stroke-opacity="0.08"/>
    <rect x="444" y="684" width="340" height="120" rx="16" fill="#EBEBF2"/>
    <text x="476" y="838" font-size="18" fill="#12121E" font-weight="500">Mumbai → Pune</text>
    <text x="476" y="864" font-size="13" fill="#44445A">30 min · from ₹18,900</text>
  </g>
  <g>
    <rect x="808" y="684" width="340" height="220" rx="16" fill="#FFFFFF" stroke="#12121E" stroke-opacity="0.08"/>
    <rect x="808" y="684" width="340" height="120" rx="16" fill="#EBEBF2"/>
    <text x="840" y="838" font-size="18" fill="#12121E" font-weight="500">Dehradun → Kedarnath</text>
    <text x="840" y="864" font-size="13" fill="#44445A">45 min · from ₹78,000</text>
  </g>
  <g>
    <rect x="1172" y="684" width="348" height="220" rx="16" fill="#FFFFFF" stroke="#12121E" stroke-opacity="0.08"/>
    <rect x="1172" y="684" width="348" height="120" rx="16" fill="#EBEBF2"/>
    <text x="1204" y="838" font-size="18" fill="#12121E" font-weight="500">Chandigarh → Manali</text>
    <text x="1204" y="864" font-size="13" fill="#44445A">40 min · from ₹41,200</text>
  </g>
</svg>
